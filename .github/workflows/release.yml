name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Debug tests
        run: cargo test --locked --all-targets --all-features
      - name: Release tests
        run: cargo test --locked --release --all-targets --all-features
      - name: Package Windows binaries
        shell: pwsh
        run: ./scripts/package_windows.ps1
      - name: CLI and fixture smoke tests
        shell: pwsh
        run: |
          $exe = '.\target\x86_64-pc-windows-msvc\release\eiscli.exe'
          & $exe --version
          & $exe --help
          & $exe clean --help
          & $exe drt --help
          & $exe fit-ecm --help
          & $exe clean -i examples/data/eis_cleaned.csv --out-root target/smoke-clean
          & $exe drt -i examples/data/eis_cleaned.csv --nonnegative --n-tau 30 --out-root target/smoke-drt
          & $exe fit-ecm -i examples/data/eis_cleaned.csv --model R_QR --auto-init --out-root target/smoke-ecm
          if (Test-Path target/smoke-clean/sample_001/run.json) { throw 'clean wrote run.json' }
          Get-Content target/smoke-clean/sample_001/input_report.json | ConvertFrom-Json | Out-Null
          $drt = Get-Content target/smoke-drt/sample_001/run.json | ConvertFrom-Json
          $ecm = Get-Content target/smoke-ecm/sample_001/run.json | ConvertFrom-Json
          if ($drt.status -ne 'success' -or $ecm.status -ne 'success') { throw 'computation manifest not successful' }
          foreach ($path in @('target/smoke-clean/sample_001/cleaned.csv', 'target/smoke-drt/sample_001/gamma.csv', 'target/smoke-drt/sample_001/drt_gamma.svg', 'target/smoke-ecm/sample_001/fit_params.json', 'target/smoke-ecm/sample_001/nyquist_fit.svg')) {
            if (-not (Test-Path $path)) { throw "Missing smoke output: $path" }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: electrochem-tools-v0.1.0-x86_64-pc-windows-msvc
          path: |
            target/dist/electrochem-tools-v0.1.0-x86_64-pc-windows-msvc.zip
            target/dist/SHA256SUMS.txt
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release create $env:GITHUB_REF_NAME target/dist/electrochem-tools-v0.1.0-x86_64-pc-windows-msvc.zip target/dist/SHA256SUMS.txt --verify-tag --title $env:GITHUB_REF_NAME --notes-file docs/release-notes-v0.1.0.md
