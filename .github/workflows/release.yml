name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Resolve package metadata
        id: package
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $package = $metadata.packages | Where-Object name -eq 'ElectrochemTools' | Select-Object -First 1
          if (-not $package) { throw 'ElectrochemTools package not found in Cargo metadata' }
          $version = $package.version
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo package version v$version"
          }
          $archive = "electrochem-tools-v$version-x86_64-pc-windows-msvc.zip"
          $notes = "docs/release-notes-v$version.md"
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and -not (Test-Path -LiteralPath $notes)) {
            throw "Missing release notes: $notes"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "archive=$archive" >> $env:GITHUB_OUTPUT
          "notes=$notes" >> $env:GITHUB_OUTPUT
      - name: Debug tests
        run: cargo test --locked --all-targets --all-features
      - name: Release tests
        run: cargo test --locked --release --all-targets --all-features
      - name: Package Windows binaries
        shell: pwsh
        run: ./scripts/package_windows.ps1
      - name: CLI and fixture smoke tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $exe = '.\target\x86_64-pc-windows-msvc\release\eiscli.exe'
          & $exe --version
          & $exe --help
          & $exe clean --help
          & $exe drt --help
          & $exe fit-ecm --help
          & $exe clean -i tests/fixtures/bayesian_eis.z60 --out-root target/smoke-clean
          & $exe drt -i tests/fixtures/bayesian_eis.z60 --nonnegative --n-tau 30 --out-root target/smoke-drt
          & $exe fit-ecm -i tests/fixtures/bayesian_eis.z60 --model R_QR --auto-init --out-root target/smoke-ecm
          if (Test-Path target/smoke-clean/bayesian_eis_cleaned) { throw 'clean wrote the obsolete per-input directory layout' }
          if (Test-Path target/smoke-clean/batch_summary.csv) { throw 'clean wrote batch_summary.csv' }
          if (Test-Path target/smoke-clean/run.json) { throw 'clean wrote run.json' }
          Get-Content target/smoke-clean/bayesian_eis_clean_state.json | ConvertFrom-Json | Out-Null
          $drt = Get-Content target/smoke-drt/bayesian_eis_drt/run.json | ConvertFrom-Json
          $ecm = Get-Content target/smoke-ecm/bayesian_eis_fit_ecm/run.json | ConvertFrom-Json
          if ($drt.status -ne 'success' -or $ecm.status -ne 'success') { throw 'computation manifest not successful' }
          foreach ($path in @('target/smoke-clean/bayesian_eis_cleaned.csv', 'target/smoke-clean/bayesian_eis_cleaned.z60', 'target/smoke-drt/batch_summary.csv', 'target/smoke-drt/bayesian_eis_drt/gamma.csv', 'target/smoke-drt/bayesian_eis_drt/drt_gamma.svg', 'target/smoke-ecm/batch_summary.csv', 'target/smoke-ecm/bayesian_eis_fit_ecm/fit_params.json', 'target/smoke-ecm/bayesian_eis_fit_ecm/nyquist_fit.svg')) {
            if (-not (Test-Path $path)) { throw "Missing smoke output: $path" }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: electrochem-tools-v${{ steps.package.outputs.version }}-x86_64-pc-windows-msvc
          if-no-files-found: error
          path: |
            target/dist/${{ steps.package.outputs.archive }}
            target/dist/SHA256SUMS.txt
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: gh release create $env:GITHUB_REF_NAME "target/dist/${{ steps.package.outputs.archive }}" target/dist/SHA256SUMS.txt --verify-tag --title $env:GITHUB_REF_NAME --notes-file "${{ steps.package.outputs.notes }}"
